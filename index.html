<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ask the 8-Ball</title>
  <link href="e-ball.css" rel="stylesheet" type="text/css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="e-ball.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="e-ball.js" defer></script>

</head>
<body>

  <! Start page >
  <div id="screen-start" class="screen active">
    <div class="ball">
      <div class="ball-window">
        <span></span>
      </div>
    </div>
    <h1>Magic 8-Ball</h1>
    <p>Ask the ball anything. It knows all.</p>
    <button onclick="showScreen('screen-question')">Ask a Question</button>
  </div>


  <! Question page >
  <div id="screen-question" class="screen">
    <h1>What is your question?</h1>
    <p>Type below and shake the ball.</p>
    <textarea id="user-question" rows="3" placeholder="Type your question here..."></textarea>
    <button onclick="submitQuestion()">Shake the Ball</button>
    <button onclick="showScreen('screen-start')" style="color:#7878a0; border-color:#7878a0; margin-top:10px;">Go Back</button>
  </div>


  <!shaking page>
  <div id="screen-loading" class="screen">
    <p>The ball is thinking...</p>
    <div class="ball shaking">
      <div class="ball-window">
        <span>?</span>
      </div>
    </div>
  </div>


  <!Answer page>
  <div id="screen-answer" class="screen">
    <p>The ball has spoken.</p>
    <div class="ball">
      <div class="ball-window">
        <span id="answer-text"></span>
      </div>
    </div>
    <p id="question-count"></p>
    <div id="funny-message"></div>
    <button onclick="showScreen('screen-question')">Ask Another</button>
    <button onclick="showScreen('screen-start')" style="color:#7878a0; border-color:#7878a0; margin-top:10px;">Go Home</button>
  </div>

</body>
</html>
